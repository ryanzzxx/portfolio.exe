<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CloudBolt - Authentic Experience v7</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Container do Dropdown */
.custom-select-wrapper {
    position: relative;
    user-select: none;
    z-index: 2000;
}

.custom-select-trigger {
    background: var(--glass-strong);
    backdrop-filter: blur(15px);
    border: 1px solid var(--border-soft);
    color: white;
    padding: 6px 15px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: 0.3s;
}

.custom-select-trigger:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Caixa de Opções Flutuante (O VERDADEIRO LIQUID GLASS) */
.custom-options {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 150px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(25px);
    border: 1px solid var(--border-soft);
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: none; /* Escondido por padrão */
    overflow: hidden;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.custom-option {
    padding: 10px 15px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.custom-option:hover {
    background: rgba(255, 255, 255, 0.1);
}

.custom-options.show {
    display: block;
}
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --apple-font: 'Inter', -apple-system, sans-serif;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-strong: rgba(255, 255, 255, 0.12);
            --border-soft: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--apple-font);
            background: radial-gradient(circle at center, #004a99 0%, #001d3d 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        header {
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 1000;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 26px;
            letter-spacing: -1px;
            cursor: pointer;
            height: 32px;
        }

        .o-cloud {
            color: #5ac8fa;
            font-size: 20px;
            margin: 0 1px;
            transition: transform 0.3s ease;
        }

        .logo-wrap:hover .o-cloud {
            animation: bounceCloud 0.6s ease infinite alternate;
        }

        @keyframes bounceCloud {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        .nav-actions { display: flex; gap: 25px; align-items: center; }
        .nav-actions a { color: white; text-decoration: none; font-size: 14px; opacity: 0.7; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            margin-top: -30px;
        }

        /* --- ÓRBITA PARA 9 IMAGENS --- */
        .orbital-zone {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .orbit {
            position: absolute;
            width: 580px; /* Um pouco maior para caber as 9 imagens sem amontoar */
            height: 580px;
            animation: rotateOrbit 70s linear infinite;
        }

        .app-icon-custom {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 11px;
            animation: keepUpright 70s linear infinite;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
            object-fit: cover;
        }

        /* Distribuição Matemática das 9 imagens em 360 graus */
        .img1 { top: 0; left: 50%; transform: translate(-50%, -50%); }
        .img2 { top: 15%; right: 15%; }
        .img3 { top: 50%; right: 0; transform: translate(50%, -50%); }
        .img4 { bottom: 15%; right: 15%; }
        .img5 { bottom: 0; left: 50%; transform: translate(-50%, 50%); }
        .img6 { bottom: 15%; left: 15%; }
        .img7 { top: 50%; left: 0; transform: translate(-50%, -50%); }
        .img8 { top: 15%; left: 15%; }
        .img9 { top: 30%; right: 5%; }

        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes keepUpright { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        /* --- CÍRCULO CENTRAL SALTADO --- */
        .card-3d-wrap {
            width: 220px;
            height: 220px;
            perspective: 1200px;
            cursor: pointer;
            z-index: 100;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(40px); /* Saltado para frente */
        }

        .card-3d-wrap:hover .card-inner { transform: rotateY(-180deg) translateZ(40px); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--glass-strong);
            backdrop-filter: blur(30px);
            border: 1.5px solid var(--border-soft);
            box-shadow: 0 40px 70px rgba(0,0,0,0.6);
        }

        .cloud-main { font-size: 80px; color: #5ac8fa; filter: drop-shadow(0 0 15px #007aff); }
        .cloud-small { font-size: 40px; position: absolute; opacity: 0.7; }
        .back-face { transform: rotateY(180deg); }
        .memoji-img { width: 170px; height: 170px; border-radius: 50%; object-fit: cover; }

        /* --- LOGIN CARD --- */
        .login-card {
            margin-top: 45px;
            width: 380px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02); /* Aba sem contorno */
            backdrop-filter: blur(50px);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 50px 110px rgba(0,0,0,0.7);
        }

        .input-box {
            background: var(--glass-strong);
            border-radius: 22px;
            border: 1.5px solid var(--border-soft);
            overflow: hidden;
            margin-top: 30px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 20px 0; /* Aumentado para garantir centralização vertical */
            background: transparent;
            border: none;
            color: white;
            text-align: center; /* CENTRALIZADO ABSOLUTO */
            font-size: 17px;
            outline: none;
            display: block;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        input:first-child { border-bottom: 1.5px solid var(--border-soft); }

        .btn-submit {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--glass-strong);
            border: 1px solid var(--border-soft);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .btn-submit:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }

    </style>
</head>
<body>

<header>
    <div class="logo-wrap">Cl<i class="fa-solid fa-cloud o-cloud"></i>udBolt</div>
    <div class="nav-actions">
        <a href="#" id="txt-criar">Criar Conta</a>
        <a href="#" id="txt-suporte">Suporte</a>
        
        <div class="custom-select-wrapper">
            <div class="custom-select-trigger">
                <span id="current-lang">Português (BR)</span>
                <i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-left: 5px;"></i>
            </div>
            <div class="custom-options">
                <div class="custom-option" data-value="pt">Português (BR)</div>
                <div class="custom-option" data-value="en">English (US)</div>
            </div>
        </div>
    </div>
</header>

<div class="main-content">
    <div class="orbital-zone">
        <div class="orbit">
            <img src="contacts.svg" class="app-icon-custom img1" alt="icon">
            <img src="calendar.svg" class="app-icon-custom img2" alt="icon">
            <img src="notes.svg" class="app-icon-custom img3" alt="icon">
            <img src="ios-message.svg" class="app-icon-custom img4" alt="icon">
            <img src="files.svg" class="app-icon-custom img5" alt="icon">
            <img src="photos.svg" class="app-icon-custom img6" alt="icon">
            <img src="facetime.svg" class="app-icon-custom img7" alt="icon">
            <img src="camera.svg" class="app-icon-custom img8" alt="icon">
            <img src="books.svg" class="app-icon-custom img9" alt="icon">
        </div>

        <div class="card-3d-wrap">
            <div class="card-inner">
                <div class="face">
                    <i class="fa-solid fa-cloud cloud-main"></i>
                    <i class="fa-solid fa-cloud cloud-small" style="top: 140px; left: 30px;"></i>
                    <i class="fa-solid fa-cloud cloud-small" style="top: 30px; right: 20px;"></i>
                </div>
                <div class="face back-face">
                    <img src="lion.gif" class="memoji-img" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                </div>
            </div>
        </div>
    </div>

    <div class="login-card">
        <div class="logo-wrap" style="justify-content: center; font-size: 34px; height: 40px;">
            Cl<i class="fa-solid fa-cloud o-cloud"></i>udBolt
        </div>
        <div class="input-box">
            <input type="text" placeholder="idCloud">
            <input type="password" placeholder="Senha">
        </div>
        <button class="btn-submit"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
</div>
<script>
    const trigger = document.querySelector('.custom-select-trigger');
    const optionsBox = document.querySelector('.custom-options');
    const options = document.querySelectorAll('.custom-option');
    
    // Abrir/Fechar Menu
    trigger.addEventListener('click', () => optionsBox.classList.toggle('show'));

    // Fechar ao clicar fora
    window.addEventListener('click', (e) => {
        if (!trigger.contains(e.target)) optionsBox.classList.remove('show');
    });

    // Lógica de Tradução
    const dictionary = {
        pt: {
            criar: "Criar Conta",
            suporte: "Suporte",
            senha: "Senha",
            label: "Português (BR)"
        },
        en: {
            criar: "Create Account",
            suporte: "Support",
            senha: "Password",
            label: "English (US)"
        }
    };

    options.forEach(option => {
        option.addEventListener('click', function() {
            const lang = this.getAttribute('data-value');
            
            // Atualiza Textos
            document.getElementById('txt-criar').innerText = dictionary[lang].criar;
            document.getElementById('txt-suporte').innerText = dictionary[lang].suporte;
            document.querySelector('input[type="password"]').placeholder = dictionary[lang].senha;
            
            // Atualiza Label do botão
            document.getElementById('current-lang').innerText = dictionary[lang].label;
            
            optionsBox.classList.remove('show');
        });
    });
</script>
</body>
</html>
